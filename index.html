<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MotoDesk — Business Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #f4a11b;
    --accent2: #e05c2a;
    --text: #f0ede8;
    --muted: #888;
    --green: #3ecf8e;
    --red: #ff6b6b;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .sync-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 6px 16px; font-size: 12px; display: flex;
    align-items: center; justify-content: space-between; gap: 8px;
  }
  .sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
  .sync-dot.green { background:var(--green); }
  .sync-dot.orange { background:var(--accent); animation: pulse 1.5s infinite; }
  .sync-dot.red { background:var(--red); }
  .sync-dot.grey { background:var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--text); }
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; }
  .nav-tab {
    background: none; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: all .2s;
  }
  .nav-tab.active { background: var(--accent); color: #000; font-weight: 600; }
  .nav-tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* LAYOUT */
  .page { display: none; padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(min-width:600px){ .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }

  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    letter-spacing: 1.5px; color: var(--accent);
    margin-bottom: 14px; margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }

  /* CARDS / TABLE */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 12px;
  }
  .card-header {
    padding: 14px 16px;
    background: var(--surface2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-body { padding: 16px; }

  /* FORM */
  .form-grid { display: grid; gap: 12px; }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
  @media(max-width:500px){ .form-grid-2 { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border .2s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 70px; }

  /* BUTTONS */
  .btn {
    padding: 10px 18px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffb73d; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { filter: brightness(1.15); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  .btn-green { background: var(--green); color: #000; }

  /* MOTO LIST */
  .moto-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px;
  }
  .moto-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .moto-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-available { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid rgba(62,207,142,.3); }
  .badge-sold { background: rgba(255,107,107,.15); color: var(--red); border: 1px solid rgba(255,107,107,.3); }
  .moto-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--muted); }
  .moto-meta span { display: flex; align-items: center; gap: 4px; }
  .moto-meta b { color: var(--text); }
  .moto-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* EXPENSES */
  .expense-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-desc { flex: 1; }
  .expense-amount { font-family: 'JetBrains Mono', monospace; color: var(--red); font-weight: 600; }

  /* SEARCH */
  .search-box { position: relative; margin-bottom: 18px; }
  .search-box input { padding-left: 38px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }

  /* TAG */
  .tag { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; color: var(--muted); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* DETAIL VIEW */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width:400px){ .detail-grid { grid-template-columns: 1fr; } }
  .detail-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
  .detail-value { font-size: 14px; font-weight: 500; }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .profit { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }
</style>
</head>
<body>

<nav>
  <div class="logo">🏍️ Moto<span>Desk</span></div>
  <div class="nav-tabs">

    <button class="nav-tab" onclick="showPage('inventory')">Inventory</button>

<!-- LOGIN SCREEN -->
<!-- DASHBOARD -->

    <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px;">SEARCH</div>

    <div class="modal-header">
      <div class="modal-title" id="detail-title">MOTORCYCLE DETAIL</div>
      <button class="close-btn" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbwDUMj3Y8pRXwzP4TUEzcIalTFCWm15kT4ldCg6e_KisUWqozMYkL84uDu1m3tG_SdV9w/exec';

// ─── DATA ─────────────────────────────────────────────────────────────────────
const DB = {
  load(key, def=[]) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } },
  save(key, data)   { localStorage.setItem(key, JSON.stringify(data)); }
};

let motos    = DB.load('motos');
let expenses = DB.load('expenses');
let editMotoId = null;
let isSyncing  = false;

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ─── SHEET SYNC ───────────────────────────────────────────────────────────────
const MOTO_HEADERS = ['id','make','model','year','plate','chassis','color','mileage','buyPrice','sellPrice','notes','sellerName','sellerPhone','sellerAddress','buyerName','buyerPhone','buyerAddress','saleDate','status','createdAt','paymentMode','paymentStatus','balance'];
const EXP_HEADERS  = ['id','motoId','desc','amount','date','category','notes','createdAt'];

async function loadFromSheet() {
  setSyncStatus('orange', 'Syncing…');
  try {
    const [mRes, eRes] = await Promise.all([
      fetch(API_URL + '?action=read&sheet=Motos').then(r=>r.json()),
      fetch(API_URL + '?action=read&sheet=Expenses').then(r=>r.json())
    ]);
    if(mRes.data && mRes.data.length > 1) {
      motos = mRes.data.slice(1).map(row => {
        const obj = {};
        MOTO_HEADERS.forEach((h,i) => obj[h] = row[i] ?? '');
        return obj;
      }).filter(o=>o.id);
      DB.save('motos', motos);
    }
    if(eRes.data && eRes.data.length > 1) {
      expenses = eRes.data.slice(1).map(row => {
        const obj = {};
        EXP_HEADERS.forEach((h,i) => obj[h] = row[i] ?? '');
        return obj;
      }).filter(o=>o.id);
      DB.save('expenses', expenses);
    }
    setSyncStatus('green', 'Synced ✓');
    renderDashboard();
    renderInventory(currentFilter);
    renderExpenses();
  } catch(e) {
    setSyncStatus('red', 'Sync failed — using local data');
  }
}

async function saveToSheet() {
  DB.save('motos', motos);
  DB.save('expenses', expenses);
  setSyncStatus('orange', 'Saving…');
  try {
    const motoRows = [MOTO_HEADERS, ...motos.map(m => MOTO_HEADERS.map(k => m[k] ?? ''))];
    const expRows  = [EXP_HEADERS,  ...expenses.map(e => EXP_HEADERS.map(k => e[k] ?? ''))];
    await Promise.all([
      fetch(API_URL + '?action=write&sheet=Motos', {
        method: 'POST', body: JSON.stringify({data: motoRows})
      }),
      fetch(API_URL + '?action=write&sheet=Expenses', {
        method: 'POST', body: JSON.stringify({data: expRows})
      })
    ]);
    setSyncStatus('green', 'Saved to Google Sheets ✓');
  } catch(e) {
    setSyncStatus('red', 'Save failed — stored locally');
  }
}

function setSyncStatus(color, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  if(dot) dot.className = `sync-dot ${color}`;
  if(txt) txt.textContent = msg;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>{ if(t.textContent.toLowerCase().includes(id.slice(0,4))) t.classList.add('active'); });
  if(id==='dashboard') renderDashboard();
  if(id==='inventory') renderInventory('all');
  if(id==='expenses') renderExpenses();
  if(id==='search') { document.getElementById('search-input').value=''; renderSearch([]); }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const now        = new Date();
  const thisYear   = now.getFullYear();
  const thisMonth  = now.getMonth();
  const monthName  = now.toLocaleString('default',{month:'long'});

  const totalExp   = expenses.reduce((s,e)=>s+Number(e.amount),0);
  const available  = motos.filter(m=>m.status==='available').length;
  const sold       = motos.filter(m=>m.status==='sold').length;
  const soldMotos  = motos.filter(m=>m.status==='sold');
  const revenue    = soldMotos.reduce((s,m)=>s+Number(m.sellPrice||0),0);
  const cogs       = soldMotos.reduce((s,m)=>s+Number(m.buyPrice||0),0);
  const expOfSold  = expenses.filter(e=>soldMotos.find(m=>m.id===e.motoId)).reduce((s,e)=>s+Number(e.amount),0);
  const profit     = revenue - cogs - expOfSold;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Available</div><div class="stat-value orange">${available}</div></div>
    <div class="stat-card"><div class="stat-label">Total Sold</div><div class="stat-value blue">${sold}</div></div>
    <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value red">₹${fmt(totalExp)}</div></div>
    <div class="stat-card"><div class="stat-label">Net Profit</div><div class="stat-value ${profit>=0?'green':'red'}">${profit>=0?'+':''} ₹${fmt(profit)}</div></div>
  `;

  const monthSold = motos.filter(m=>{
    if(m.status!=='sold' || !m.saleDate) return false;
    const d = new Date(m.saleDate);
    return d.getFullYear()===thisYear && d.getMonth()===thisMonth;
  });

  const monthRevenue = monthSold.reduce((s,m)=>s+Number(m.sellPrice||0),0);
  const monthCogs    = monthSold.reduce((s,m)=>s+Number(m.buyPrice||0),0);
  const monthExp     = expenses.filter(e=>monthSold.find(m=>m.id===e.motoId)).reduce((s,e)=>s+Number(e.amount),0);
  const monthProfit  = monthRevenue - monthCogs - monthExp;

  document.getElementById('month-label').textContent = `${monthName} ${thisYear}`;
  document.getElementById('month-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Bikes Sold</div><div class="stat-value orange">${monthSold.length}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value blue" style="font-size:22px;">₹${fmt(monthRevenue)}</div></div>
    <div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-value red" style="font-size:22px;">₹${fmt(monthExp)}</div></div>
    <div class="stat-card"><div class="stat-label">Profit</div><div class="stat-value ${monthProfit>=0?'green':'red'}" style="font-size:22px;">${monthProfit>=0?'+':''} ₹${fmt(monthProfit)}</div></div>
  `;

  document.getElementById('month-sold-list').innerHTML = monthSold.length
    ? monthSold.map(m=>`
    <div class="moto-card" style="cursor:pointer;" onclick="openDetail('${m.id}')">
      <div class="moto-header">
        <div class="moto-title">${m.year} ${m.make} ${m.model}</div>
        <span class="badge badge-sold">sold</span>
      </div>
      <div class="moto-meta">
        <span>🔖 <b>${m.plate||'—'}</b></span>
        <span>📅 <b>${m.saleDate}</b></span>
        <span>🏷️ <b>₹${fmt(m.sellPrice)}</b></span>
        ${m.buyerName?`<span>🛒 <b>${m.buyerName}</b></span>`:''}
        ${m.paymentStatus?`<span style="color:${m.paymentStatus==='Paid in Full'?'var(--green)':'var(--red)'}">💳 <b>${m.paymentStatus}</b></span>`:''}
        ${m.paymentStatus==='Partially Paid'&&m.balance?`<span style="color:var(--red)">⚠️ Balance: <b>₹${fmt(m.balance)}</b></span>`:''}
      </div>
    </div>`).join('')
    : '<div class="empty"><div class="empty-icon">📭</div>No sales this month yet</div>';
}

// ─── INVENTORY ────────────────────────────────────────────────────────────────
let currentFilter = 'all';
function filterInventory(f) {
  currentFilter = f;
  ['all','available','sold'].forEach(x=>{
    document.getElementById('filter-'+x).classList.toggle('btn-primary', x===f);
  });
  renderInventory(f);
}
function renderInventory(filter) {
  const list = filter==='all' ? motos : motos.filter(m=>m.status===filter);
  const el = document.getElementById('inventory-list');
  if(!list.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🏍️</div>No motorcycles found</div>'; return; }
  el.innerHTML = [...list].sort((a,b)=>b.createdAt-a.createdAt).map(m=>{
    const exp = expenses.filter(e=>e.motoId===m.id).reduce((s,e)=>s+Number(e.amount),0);
    return `
    <div class="moto-card">
      <div class="moto-header">
        <div>
          <div class="moto-title">${m.year} ${m.make} ${m.model}</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">${m.plate||''} ${m.color?'· '+m.color:''}</div>
        </div>
        <span class="badge badge-${m.status}">${m.status}</span>
      </div>
      <div class="moto-meta">
        <span>🛣️ <b>${Number(m.mileage||0).toLocaleString()} km</b></span>
        <span>💰 Bought: <b>₹${fmt(m.buyPrice)}</b></span>
        <span>🏷️ Price: <b>₹${fmt(m.sellPrice)}</b></span>
        <span>🔧 Expenses: <b style="color:var(--red)">₹${fmt(exp)}</b></span>
      </div>
      <div class="moto-actions">
        <button class="btn btn-ghost btn-sm" onclick="openDetail('${m.id}')">View</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditMoto('${m.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="openAddExpenseFor('${m.id}')">+ Expense</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMoto('${m.id}')">Delete</button>
      </div>
    </div>`}).join('');
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────────
function renderExpenses() {
  const el = document.getElementById('expense-list');
  if(!expenses.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔧</div>No expenses yet</div>'; return; }
  const grouped = {};
  [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e=>{
    const moto = motos.find(m=>m.id===e.motoId);
    const key  = moto ? `${moto.year} ${moto.make} ${moto.model}` : 'General';
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(e);
  });
  el.innerHTML = Object.entries(grouped).map(([key,exps])=>{
    const total = exps.reduce((s,e)=>s+Number(e.amount),0);
    return `<div class="card" style="margin-bottom:14px;">
      <div class="card-header">
        <span style="font-weight:600;">${key}</span>
        <span class="expense-amount">-₹${fmt(total)}</span>
      </div>
      <div class="card-body" style="padding:0 16px;">
        ${exps.map(e=>`
        <div class="expense-row">
          <div class="expense-desc">
            <div style="font-weight:500;">${e.desc}</div>
            <div style="font-size:12px; color:var(--muted);">${e.date} · <span class="tag">${e.category}</span></div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="expense-amount">-₹${fmt(e.amount)}</span>
            <button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">✕</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`}).join('');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if(!q) { renderSearch([]); return; }
  const results = motos.filter(m=>
    [m.make,m.model,m.year,m.plate,m.chassis,m.color,m.sellerName,m.sellerPhone,m.buyerName,m.buyerPhone,m.notes]
    .some(v=>String(v||'').toLowerCase().includes(q))
  );
  renderSearch(results);
}
function renderSearch(results) {
  const el = document.getElementById('search-results');
  if(!results.length) {
    const q = document.getElementById('search-input').value;
    el.innerHTML = q ? '<div class="empty"><div class="empty-icon">🔍</div>No results found</div>' : '';
    return;
  }
  el.innerHTML = results.map(m=>{
    const exp = expenses.filter(e=>e.motoId===m.id).reduce((s,e)=>s+Number(e.amount),0);
    return `<div class="moto-card" style="cursor:pointer;" onclick="openDetail('${m.id}')">
      <div class="moto-header">
        <div class="moto-title">${m.year} ${m.make} ${m.model}</div>
        <span class="badge badge-${m.status}">${m.status}</span>
      </div>
      <div class="moto-meta">
        <span>🔖 <b>${m.plate||'—'}</b></span>
        ${m.chassis?`<span>🔩 <b>${m.chassis}</b></span>`:''}
        ${m.sellerName?`<span>👤 Seller: <b>${m.sellerName}</b></span>`:''}
        ${m.buyerName?`<span>🛒 Buyer: <b>${m.buyerName}</b></span>`:''}
        <span>🔧 Exp: <b>₹${fmt(exp)}</b></span>
      </div>
    </div>`;
  }).join('');
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function toggleBalance() {
  const status = document.getElementById('m-payment-status').value;
  const balField = document.getElementById('balance-field');
  balField.style.display = status === 'Partially Paid' ? 'block' : 'none';
  if(status !== 'Partially Paid') document.getElementById('m-balance').value = '';
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddMoto() {
  editMotoId = null;
  document.getElementById('modal-moto-title').textContent = 'ADD MOTORCYCLE';
  ['make','model','year','plate','chassis','color','mileage','buy-price','sell-price','notes',
   'seller-name','seller-phone','seller-address',
   'buyer-name','buyer-phone','buyer-address','sale-date','payment-mode','payment-status','balance'].forEach(f=>{
    document.getElementById('m-'+f).value='';
  });
  document.getElementById('m-status').value='available';
  document.getElementById('balance-field').style.display='none';
  openModal('modal-moto');
}

function openEditMoto(id) {
  editMotoId = id;
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('modal-moto-title').textContent = 'EDIT MOTORCYCLE';
  document.getElementById('m-make').value=m.make||'';
  document.getElementById('m-model').value=m.model||'';
  document.getElementById('m-year').value=m.year||'';
  document.getElementById('m-plate').value=m.plate||'';
  document.getElementById('m-chassis').value=m.chassis||'';
  document.getElementById('m-color').value=m.color||'';
  document.getElementById('m-mileage').value=m.mileage||'';
  document.getElementById('m-buy-price').value=m.buyPrice||'';
  document.getElementById('m-sell-price').value=m.sellPrice||'';
  document.getElementById('m-notes').value=m.notes||'';
  document.getElementById('m-seller-name').value=m.sellerName||'';
  document.getElementById('m-seller-phone').value=m.sellerPhone||'';
  document.getElementById('m-seller-address').value=m.sellerAddress||'';
  document.getElementById('m-buyer-name').value=m.buyerName||'';
  document.getElementById('m-buyer-phone').value=m.buyerPhone||'';
  document.getElementById('m-buyer-address').value=m.buyerAddress||'';
  document.getElementById('m-sale-date').value=m.saleDate||'';
  document.getElementById('m-status').value=m.status||'available';
  document.getElementById('m-payment-mode').value=m.paymentMode||'';
  document.getElementById('m-payment-status').value=m.paymentStatus||'';
  document.getElementById('m-balance').value=m.balance||'';
  document.getElementById('balance-field').style.display = m.paymentStatus==='Partially Paid' ? 'block' : 'none';
  openModal('modal-moto');
}

async function saveMoto() {
  const m = {
    id: editMotoId || uid(),
    make: v('m-make'), model: v('m-model'), year: v('m-year'), plate: v('m-plate'),
    chassis: v('m-chassis'), color: v('m-color'), mileage: v('m-mileage'),
    buyPrice: v('m-buy-price'), sellPrice: v('m-sell-price'), notes: v('m-notes'),
    sellerName: v('m-seller-name'), sellerPhone: v('m-seller-phone'), sellerAddress: v('m-seller-address'),
    buyerName: v('m-buyer-name'), buyerPhone: v('m-buyer-phone'), buyerAddress: v('m-buyer-address'),
    saleDate: v('m-sale-date'), status: v('m-status'),
    paymentMode: v('m-payment-mode'), paymentStatus: v('m-payment-status'),
    balance: v('m-balance'),
    createdAt: editMotoId ? (motos.find(x=>x.id===editMotoId)||{}).createdAt||Date.now() : Date.now()
  };
  if(!m.make || !m.model) { alert('Make and Model are required.'); return; }
  if(editMotoId) { motos = motos.map(x=>x.id===editMotoId?m:x); }
  else { motos.unshift(m); }
  closeModal('modal-moto');
  renderInventory(currentFilter);
  await saveToSheet();
}

async function deleteMoto(id) {
  if(!confirm('Delete this motorcycle? All linked expenses will also be removed.')) return;
  motos = motos.filter(m=>m.id!==id);
  expenses = expenses.filter(e=>e.motoId!==id);
  renderInventory(currentFilter);
  await saveToSheet();
}

function openAddExpense() {
  populateExpenseMotoSelect();
  document.getElementById('e-moto-id').value='';
  document.getElementById('e-desc').value='';
  document.getElementById('e-amount').value='';
  document.getElementById('e-date').value=today();
  document.getElementById('e-notes').value='';
  openModal('modal-expense');
}
function openAddExpenseFor(motoId) {
  openAddExpense();
  document.getElementById('e-moto-id').value=motoId;
}
function populateExpenseMotoSelect() {
  const sel = document.getElementById('e-moto-id');
  sel.innerHTML='<option value="">— General / Unlinked —</option>';
  motos.forEach(m=>{ const o=document.createElement('option'); o.value=m.id; o.textContent=`${m.year} ${m.make} ${m.model} (${m.plate||'no reg'})`; sel.appendChild(o); });
}
async function saveExpense() {
  const e = { id:uid(), motoId:v('e-moto-id'), desc:v('e-desc'), amount:Number(v('e-amount')),
               date:v('e-date'), category:v('e-category'), notes:v('e-notes'), createdAt:Date.now() };
  if(!e.desc || !e.amount) { alert('Description and amount required.'); return; }
  expenses.unshift(e);
  closeModal('modal-expense');
  renderExpenses();
  await saveToSheet();
}
async function deleteExpense(id) {
  if(!confirm('Remove this expense?')) return;
  expenses = expenses.filter(e=>e.id!==id);
  renderExpenses();
  await saveToSheet();
}

// ─── RETURN VEHICLE ───────────────────────────────────────────────────────────
async function returnVehicle(id) {
  if(!confirm('Mark this vehicle as returned? It will be set back to Available and buyer details will be cleared.')) return;
  motos = motos.map(m=>{
    if(m.id!==id) return m;
    return {...m, status:'available', buyerName:'', buyerPhone:'', buyerAddress:'', saleDate:''};
  });
  closeModal('modal-detail');
  renderDashboard();
  renderInventory(currentFilter);
  await saveToSheet();
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(id) {
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  const exp = expenses.filter(e=>e.motoId===m.id);
  const totalExp = exp.reduce((s,e)=>s+Number(e.amount),0);
  const profit = Number(m.sellPrice||0) - Number(m.buyPrice||0) - totalExp;

  document.getElementById('detail-title').textContent = `${m.year} ${m.make} ${m.model}`;
  document.getElementById('detail-body').innerHTML = `
    <div style="margin-bottom:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <span class="badge badge-${m.status}">${m.status}</span>
      ${m.plate?`<span class="tag">🔖 ${m.plate}</span>`:''}
      ${m.chassis?`<span class="tag">🔩 ${m.chassis}</span>`:''}
      ${m.color?`<span class="tag">${m.color}</span>`:''}
    </div>
    <div class="detail-grid" style="margin-bottom:16px;">
      <div class="detail-item"><div class="detail-label">Reg. Number</div><div class="detail-value">${m.plate||'—'}</div></div>
      <div class="detail-item"><div class="detail-label">Chassis No.</div><div class="detail-value">${m.chassis||'—'}</div></div>
      <div class="detail-item"><div class="detail-label">Mileage</div><div class="detail-value">${Number(m.mileage||0).toLocaleString()} km</div></div>
      <div class="detail-item"><div class="detail-label">Purchase Price</div><div class="detail-value">₹${fmt(m.buyPrice)}</div></div>
      <div class="detail-item"><div class="detail-label">Sell Price</div><div class="detail-value">₹${fmt(m.sellPrice)}</div></div>
      <div class="detail-item"><div class="detail-label">Repair Expenses</div><div class="detail-value" style="color:var(--red)">-₹${fmt(totalExp)}</div></div>
    </div>
    ${m.notes?`<div style="font-size:13px; color:var(--muted); margin-bottom:14px;">📝 ${m.notes}</div>`:''}
    <div style="display:flex; align-items:center; gap:10px; padding:12px; background:var(--surface2); border-radius:8px; margin-bottom:16px;">
      <span style="font-size:13px; color:var(--muted);">Net Profit:</span>
      <span class="profit" style="color:${profit>=0?'var(--green)':'var(--red)'};">${profit>=0?'+':''} ₹${fmt(profit)}</span>
    </div>
    <hr class="divider"/>
    <div style="font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--accent); letter-spacing:1px; margin-bottom:10px;">SELLER</div>
    ${m.sellerName||m.sellerPhone?`
    <div class="detail-grid" style="margin-bottom:16px;">
      ${m.sellerName?`<div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${m.sellerName}</div></div>`:''}
      ${m.sellerPhone?`<div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value">${m.sellerPhone}</div></div>`:''}
      ${m.sellerAddress?`<div class="detail-item" style="grid-column:1/-1;"><div class="detail-label">Address</div><div class="detail-value">${m.sellerAddress}</div></div>`:''}
    </div>`:'<div style="color:var(--muted); font-size:13px; margin-bottom:14px;">No seller info</div>'}
    <hr class="divider"/>
    <div style="font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--blue); letter-spacing:1px; margin-bottom:10px;">BUYER</div>
    ${m.buyerName||m.buyerPhone?`
    <div class="detail-grid" style="margin-bottom:16px;">
      ${m.buyerName?`<div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${m.buyerName}</div></div>`:''}
      ${m.buyerPhone?`<div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value">${m.buyerPhone}</div></div>`:''}
      ${m.saleDate?`<div class="detail-item"><div class="detail-label">Sale Date</div><div class="detail-value">${m.saleDate}</div></div>`:''}
      ${m.paymentMode?`<div class="detail-item"><div class="detail-label">Payment Mode</div><div class="detail-value">${m.paymentMode}</div></div>`:''}
      ${m.paymentStatus?`<div class="detail-item"><div class="detail-label">Payment Status</div><div class="detail-value" style="color:${m.paymentStatus==='Paid in Full'?'var(--green)':'var(--red)'}">${m.paymentStatus}</div></div>`:''}
      ${m.paymentStatus==='Partially Paid'&&m.balance?`<div class="detail-item"><div class="detail-label">Balance Due</div><div class="detail-value" style="color:var(--red);font-weight:700;">₹${fmt(m.balance)}</div></div>`:''}
      ${m.buyerAddress?`<div class="detail-item" style="grid-column:1/-1;"><div class="detail-label">Address</div><div class="detail-value">${m.buyerAddress}</div></div>`:''}
    </div>`:'<div style="color:var(--muted); font-size:13px; margin-bottom:14px;">Not sold yet</div>'}
    ${exp.length?`
    <hr class="divider"/>
    <div style="font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--accent); letter-spacing:1px; margin-bottom:10px;">REPAIR EXPENSES</div>
    ${exp.map(e=>`<div class="expense-row"><div class="expense-desc"><div style="font-weight:500;">${e.desc}</div><div style="font-size:12px; color:var(--muted);">${e.date} · <span class="tag">${e.category}</span></div></div><span class="expense-amount">-₹${fmt(e.amount)}</span></div>`).join('')}`:''}
  `;
  document.getElementById('detail-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-detail')">Close</button>
    ${m.status==='sold' ? `<button class="btn btn-ghost" style="border-color:var(--red);color:var(--red);" onclick="returnVehicle('${m.id}')">↩ Mark Returned</button>` : ''}
    <button class="btn btn-primary" onclick="closeModal('modal-detail'); openEditMoto('${m.id}')">Edit</button>
  `;
  openModal('modal-detail');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function v(id) { return document.getElementById(id).value.trim(); }
function fmt(n) { return Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function today() { return new Date().toISOString().slice(0,10); }

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderDashboard();
loadFromSheet();
</script>
</body>
